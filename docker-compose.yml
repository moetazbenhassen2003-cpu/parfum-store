services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: parfum_db
      POSTGRES_USER: parfum_user
      POSTGRES_PASSWORD: parfum_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/parfum_db
      SPRING_DATASOURCE_USERNAME: parfum_user
      SPRING_DATASOURCE_PASSWORD: parfum_password_change_me
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      APP_BASE_URL: http://localhost:8081
      APP_FRONTEND_URL: https://YOUR-FRONTEND-URL.vercel.app
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - backend_uploads:/app/uploads

volumes:
  postgres_data:
  backend_uploads:
